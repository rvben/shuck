# Shuck configuration file
#
# Config file discovery order:
#   1. --config flag (explicit path)
#   2. ~/.config/shuck/config.toml (user config)
#   3. /etc/shuck/config.toml (system config)
#
# All fields are optional and have sensible defaults.

# ── Storage ──────────────────────────────────────────────────────────

# Base directory for VM images, state database, and runtime files.
#   macOS default: ~/.local/share/shuck
#   Linux default: /var/lib/shuck when writable, otherwise ~/.local/share/shuck
#                  (honors $XDG_DATA_HOME). Setting SHUCK_DATA_DIR also
#                  cascades to default_kernel/default_rootfs/default_initrd
#                  unless those are set explicitly.
# data_dir = "/var/lib/shuck"

# ── Kernel ───────────────────────────────────────────────────────────

# Default kernel used when --kernel is not passed to `shuck run`.
#   macOS default: <data_dir>/kernels/Image-virt   (uncompressed ARM64 Image)
#   Linux default: <data_dir>/kernels/vmlinux       (uncompressed x86_64 ELF)
# default_kernel = "/var/lib/shuck/kernels/vmlinux"

# Path to the default rootfs image. Used when `shuck run` is invoked
# without an explicit rootfs argument.
#   aarch64 default: <data_dir>/images/alpine-aarch64.ext4
#   x86_64 default:  <data_dir>/images/alpine-x86_64.ext4
# default_rootfs = "/var/lib/shuck/images/alpine-x86_64.ext4"

# Optional initrd/initramfs path used alongside the default kernel.
# Apple VZ requires one for Alpine linux-virt (virtio_blk is a module,
# not built-in) — build with `make build-initramfs`.
# default_initrd = "/var/lib/shuck/kernels/initramfs-virt.gz"

# Base URL for `shuck images pull`. Must host kernel-<arch>,
# initramfs-<arch>.gz, rootfs-<arch>.ext4, and SHA256SUMS at the root.
# images_base_url = "https://github.com/rvben/shuck/releases/latest/download"

# ── API Security and Limits ─────────────────────────────────────────

# Optional bearer token required by mutating and shell endpoints.
# Set this in production or whenever daemon binds beyond localhost.
# api_token = "replace-with-a-long-random-token"

# Global max HTTP request body size accepted by the API (bytes).
# api_max_request_bytes = 2097152

# Max bytes returned by files/read endpoint before request is rejected.
# api_max_file_read_bytes = 1048576

# Max decoded bytes accepted by files/write endpoint.
# api_max_file_write_bytes = 1048576

# Sliding-window limit for sensitive API routes per client per minute.
# A value of 0 disables rate limiting.
# api_sensitive_rate_limit_per_minute = 120

# Allowed guest path prefixes for read and write operations.
# Empty lists allow all absolute guest paths.
# allowed_read_paths = ["/tmp", "/var/log"]
# allowed_write_paths = ["/tmp", "/var/tmp"]

# Exec policy controls.
# Empty allowlist permits all commands not explicitly denied.
# exec_timeout_secs = 30
# exec_allowlist = ["echo", "ls", "cat"]
# exec_denylist = ["rm", "mkfs", "dd"]
# exec_env_allowlist = ["PATH", "HOME", "TERM"]

# ── Firecracker (Linux only) ─────────────────────────────────────────

# Path to the Firecracker binary. Must be on a filesystem that supports
# execution. On most distros the default of "firecracker" works if it's
# installed in $PATH.
# firecracker_bin = "firecracker"

# ── Networking (Linux only) ──────────────────────────────────────────

# Host interface used for outbound NAT from guest VMs.
# host_interface = "eth0"

# Bridge device created by the daemon for guest networking.
# bridge_name = "shuck0"

# Subnet from which /30 blocks are allocated to each VM.
# The gateway (.1 of the subnet) is assigned to the bridge.
# bridge_subnet = "172.20.0.0/24"

# DNS servers injected into guest /etc/resolv.conf via the agent.
# dns_servers = ["8.8.8.8", "1.1.1.1"]

# ── Environment Variable Overrides ─────────────────────────────────
#
# All configuration values can be overridden via environment variables.
# Environment variables take precedence over file-based config.
#
#   SHUCK_DATA_DIR         →  data_dir
#   SHUCK_DEFAULT_KERNEL   →  default_kernel
#   SHUCK_DEFAULT_ROOTFS   →  default_rootfs
#   SHUCK_DEFAULT_INITRD   →  default_initrd
#   SHUCK_IMAGES_BASE_URL  →  images_base_url
#   SHUCK_FIRECRACKER_BIN  →  firecracker_bin    (Linux only)
#   SHUCK_HOST_INTERFACE   →  host_interface     (Linux only)
#   SHUCK_BRIDGE_NAME      →  bridge_name        (Linux only)
#   SHUCK_BRIDGE_SUBNET    →  bridge_subnet      (Linux only)
#   SHUCK_DNS_SERVERS      →  dns_servers        (Linux only, comma-separated)
#
# Example:
#   SHUCK_DATA_DIR=/tmp/shuck shuck daemon
