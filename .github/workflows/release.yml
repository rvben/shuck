name: Release

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run mode (skip actual publishing)'
        required: false
        default: true
        type: boolean
      skip_pypi:
        description: 'Skip publishing to PyPI (if already published)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: taiki-e/install-action@nextest

      - name: Verify Cargo.lock is up to date
        run: cargo check --locked --workspace

      - name: Run tests
        run: make test

  build:
    name: Build ${{ matrix.target }}
    needs: test
    timeout-minutes: 45
    if: github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Clean stale dist
        run: rm -rf dist target/wheels

      - name: Install maturin + zig (Linux)
        if: runner.os == 'Linux'
        run: pip install maturin ziglang cargo-zigbuild

      - name: Install maturin + wheel (macOS)
        if: runner.os == 'macOS'
        run: pip3 install --break-system-packages maturin wheel

      - name: Build binary (Linux, cross via zigbuild for manylinux_2_28)
        if: runner.os == 'Linux'
        run: cargo zigbuild --release --target ${{ matrix.target }}.2.28 --package shuck

      - name: Build wheel (Linux, maturin + zig for manylinux_2_28)
        if: runner.os == 'Linux'
        run: maturin build --release --target ${{ matrix.target }} --compatibility manylinux_2_28 --zig --out dist

      - name: Build binary (macOS, no-default-features + codesign)
        if: runner.os == 'macOS'
        run: |
          cargo build --release --no-default-features --target ${{ matrix.target }} --package shuck
          codesign --entitlements shuck.entitlements --force --sign - \
            target/${{ matrix.target }}/release/shuck
          codesign -d --entitlements :- target/${{ matrix.target }}/release/shuck

      - name: Build wheel (macOS, no-default-features)
        if: runner.os == 'macOS'
        run: maturin build --release --no-default-features --target ${{ matrix.target }} --out dist

      - name: Codesign wheel binary (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p wheel-extract
          WHEEL=$(ls dist/*.whl)
          wheel unpack "$WHEEL" -d wheel-extract
          BIN=$(find wheel-extract -type f -name shuck | head -1)
          if [[ -z "$BIN" ]]; then
            echo "error: shuck binary not found in wheel" >&2
            exit 1
          fi
          codesign --entitlements shuck.entitlements --force --sign - "$BIN"
          EXTRACT_DIR=$(find wheel-extract -maxdepth 1 -mindepth 1 -type d | head -1)
          rm "$WHEEL"
          wheel pack "$EXTRACT_DIR" --dest-dir dist/
          rm -rf wheel-extract

      - name: Verify native binary (host-runnable targets)
        if: matrix.target == 'x86_64-unknown-linux-gnu' || matrix.target == 'aarch64-apple-darwin'
        run: ./target/${{ matrix.target }}/release/shuck --version

      - name: Create release archive
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          if [[ -z "${VERSION}" || "${VERSION}" == "${GITHUB_REF}" ]]; then
            VERSION="v0.0.0-dev"
          fi
          ARCHIVE_NAME="shuck-${VERSION}-${{ matrix.target }}"

          mkdir -p release-package
          cp target/${{ matrix.target }}/release/shuck release-package/shuck
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            cp shuck.entitlements release-package/
          fi

          tar -czf "${ARCHIVE_NAME}.tar.gz" -C release-package .

          if [[ "${{ runner.os }}" == "macOS" ]]; then
            shasum -a 256 "${ARCHIVE_NAME}.tar.gz" > "${ARCHIVE_NAME}.tar.gz.sha256"
          else
            sha256sum "${ARCHIVE_NAME}.tar.gz" > "${ARCHIVE_NAME}.tar.gz.sha256"
          fi

          rm -rf release-package

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          path: dist/*.whl
          name: wheel-${{ matrix.target }}

      - name: Upload release archives
        uses: actions/upload-artifact@v4
        with:
          path: |
            shuck-*-${{ matrix.target }}.tar.gz
            shuck-*-${{ matrix.target }}.tar.gz.sha256
          name: release-${{ matrix.target }}

  sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install maturin
        run: pip install maturin

      - name: Build sdist
        run: maturin sdist --out dist

      - uses: actions/upload-artifact@v4
        with:
          path: dist/*.tar.gz
          name: sdist

  release:
    runs-on: ubuntu-latest
    needs: [build, sdist]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: false

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish to PyPI
        if: ${{ inputs.dry_run != true && inputs.skip_pypi != true }}
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          uv tool run twine upload artifacts/wheel-*/*.whl artifacts/sdist/*.tar.gz

      - name: Test PyPI upload (dry run)
        if: ${{ inputs.dry_run == true && inputs.skip_pypi != true }}
        run: |
          echo "DRY RUN: Would upload to PyPI:"
          find artifacts/wheel-* -name "*.whl" -type f | sort
          find artifacts/sdist -name "*.tar.gz" -type f | sort
          uv tool run twine check artifacts/wheel-*/*.whl artifacts/sdist/*.tar.gz

      - name: Skip PyPI publishing
        if: ${{ inputs.skip_pypi == true }}
        run: echo "Skipping PyPI publishing as requested"

      - name: Create Release
        if: ${{ inputs.dry_run != true }}
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/release-*/shuck-*.tar.gz
            artifacts/release-*/shuck-*.tar.gz.sha256

      - name: Dry Run Summary
        if: ${{ inputs.dry_run == true }}
        run: |
          echo "Dry run complete. Artifacts built but nothing published."
          echo "Archives:"
          find artifacts/release-* -type f | sort

  update-homebrew:
    name: Update Homebrew tap
    needs: release
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/artifacts

      - name: Compute SHA256 hashes
        id: hashes
        run: |
          for target in x86_64-apple-darwin aarch64-apple-darwin x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu; do
            sha=$(cat /tmp/artifacts/release-${target}/shuck-${{ github.ref_name }}-${target}.tar.gz.sha256 | awk '{print $1}')
            key=$(echo "${target}" | tr '-' '_')
            echo "${key}=${sha}" >> "$GITHUB_OUTPUT"
          done

      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION_NUM="${VERSION#v}"

          cat > /tmp/shuck.rb << 'FORMULA'
          class Shuck < Formula
            desc "MicroVM manager built on Firecracker (Linux) and Apple Virtualization.framework (macOS)"
            homepage "https://github.com/rvben/shuck"
            version "VERSION_NUM"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/rvben/shuck/releases/download/VERSION/shuck-VERSION-aarch64-apple-darwin.tar.gz"
                sha256 "SHA_AARCH64_APPLE_DARWIN"
              else
                url "https://github.com/rvben/shuck/releases/download/VERSION/shuck-VERSION-x86_64-apple-darwin.tar.gz"
                sha256 "SHA_X86_64_APPLE_DARWIN"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/rvben/shuck/releases/download/VERSION/shuck-VERSION-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "SHA_AARCH64_UNKNOWN_LINUX_GNU"
              else
                url "https://github.com/rvben/shuck/releases/download/VERSION/shuck-VERSION-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "SHA_X86_64_UNKNOWN_LINUX_GNU"
              end
            end

            def install
              bin.install "shuck"
            end

            test do
              system "#{bin}/shuck", "--version"
            end
          end
          FORMULA

          sed -i "s/VERSION_NUM/${VERSION_NUM}/g" /tmp/shuck.rb
          sed -i "s/VERSION/${VERSION}/g" /tmp/shuck.rb
          sed -i "s/SHA_AARCH64_APPLE_DARWIN/${{ steps.hashes.outputs.aarch64_apple_darwin }}/g" /tmp/shuck.rb
          sed -i "s/SHA_X86_64_APPLE_DARWIN/${{ steps.hashes.outputs.x86_64_apple_darwin }}/g" /tmp/shuck.rb
          sed -i "s/SHA_AARCH64_UNKNOWN_LINUX_GNU/${{ steps.hashes.outputs.aarch64_unknown_linux_gnu }}/g" /tmp/shuck.rb
          sed -i "s/SHA_X86_64_UNKNOWN_LINUX_GNU/${{ steps.hashes.outputs.x86_64_unknown_linux_gnu }}/g" /tmp/shuck.rb

          git clone https://x-access-token:${GH_TOKEN}@github.com/rvben/homebrew-tap.git /tmp/tap
          mkdir -p /tmp/tap/Formula
          cp /tmp/shuck.rb /tmp/tap/Formula/shuck.rb
          cd /tmp/tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/shuck.rb
          git diff --cached --quiet || git commit -m "Update shuck to ${VERSION}"
          git push
